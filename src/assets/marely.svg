<svg width="680" height="460" viewBox="0 0 680 460" role="img" xmlns="http://www.w3.org/2000/svg">
    <title>Logo Marely Librería y Papelería</title>
    <desc>Logo Marely fondo customizable, letras ME en crema, banda central dorada</desc>

    <style>
    :root {
      --bg: #0D0D0A;
      --letter-fill: #F0E8D0;
      --gold: #C9A84C;
      --gold-bright: #D4A017;
      --text-light: #E8DDB8;
    }
    .bg { fill: var(--bg); }
    .letter { fill: var(--letter-fill); }
    .band { fill: var(--bg); }
    .gold-stroke { stroke: var(--gold); }
    .gold-fill { fill: var(--gold); }
    .gold-bright-fill { fill: var(--gold-bright); }
    .text-light-fill { fill: var(--text-light); }

    /* Para cambiar el fondo, simplemente redefine --bg: */
    /* Ej: :root { --bg: #0a1628; } para azul oscuro */
    /* Ej: :root { --bg: #1a0a0a; } para rojo oscuro */
  </style>

    <!-- Fondo principal -->
    <rect width="680" height="460" class="bg" rx="12" />

    <!-- Marco dorado exterior -->
    <rect x="20" y="20" width="640" height="420" fill="none" class="gold-stroke" stroke-width="1.2"
        rx="2" />
    <rect x="28" y="28" width="624" height="404" fill="none" class="gold-stroke" stroke-width="0.35"
        rx="1" />

    <!-- M grande -->
    <text x="52" y="335"
        font-family="'Playfair Display', 'Times New Roman', serif"
        font-size="310"
        font-weight="900"
        class="letter">M</text>

    <!-- E grande -->
    <text x="408" y="335"
        font-family="'Playfair Display', 'Times New Roman', serif"
        font-size="310"
        font-weight="900"
        class="letter">E</text>

    <!-- Banda central: del ancho exacto de las letras -->
    <rect x="52" y="158" width="576" height="142" class="band" />

    <!-- Línea dorada superior -->
    <line x1="52" y1="158" x2="628" y2="158" class="gold-stroke" stroke-width="1.2" />
    <!-- Línea dorada inferior -->
    <line x1="52" y1="300" x2="628" y2="300" class="gold-stroke" stroke-width="1.2" />

    <!-- Diamantes -->
    <polygon points="340,151 347,158 340,165 333,158" class="gold-fill" />
    <polygon points="340,293 347,300 340,307 333,300" class="gold-fill" />

    <!-- Puntos esquinas superiores -->
    <circle cx="56" cy="158" r="2.5" class="gold-fill" />
    <circle cx="624" cy="158" r="2.5" class="gold-fill" />
    <!-- Puntos esquinas inferiores -->
    <circle cx="56" cy="300" r="2.5" class="gold-fill" />
    <circle cx="624" cy="300" r="2.5" class="gold-fill" />

    <!-- MARELY -->
    <text x="340" y="220"
        font-family="'Playfair Display', 'Times New Roman', serif"
        font-size="46"
        font-weight="900"
        class="gold-bright-fill"
        text-anchor="middle"
        letter-spacing="20">MARELY</text>

    <!-- Separador -->
    <line x1="200" y1="236" x2="480" y2="236" class="gold-stroke" stroke-width="0.6" />

    <!-- LIBRERÍA & PAPELERÍA -->
    <text x="340" y="266"
        font-family="'Cormorant Garamond', 'Georgia', serif"
        font-size="14"
        font-weight="600"
        class="text-light-fill"
        text-anchor="middle"
        letter-spacing="6">LIBRERÍA &amp; PAPELERÍA</text>

    <!-- Pluma izquierda -->
    <g transform="translate(90,375) rotate(-40)">
        <path d="M0,0 C1,-5 4,-13 3,-26 C2,-33 0,-38 -1,-42" fill="none" class="gold-stroke"
            stroke-width="1" stroke-linecap="round" />
        <path d="M3,-26 C9,-22 11,-14 7,-8 C4,-3 0,0 0,0 C0,-4 2,-9 1,-15 C0,-21 -1,-24 3,-26 Z"
            class="gold-fill" fill-opacity="0.9" />
    </g>

    <!-- Pluma derecha -->
    <g transform="translate(590,375) rotate(40) scale(-1,1)">
        <path d="M0,0 C1,-5 4,-13 3,-26 C2,-33 0,-38 -1,-42" fill="none" class="gold-stroke"
            stroke-width="1" stroke-linecap="round" />
        <path d="M3,-26 C9,-22 11,-14 7,-8 C4,-3 0,0 0,0 C0,-4 2,-9 1,-15 C0,-21 -1,-24 3,-26 Z"
            class="gold-fill" fill-opacity="0.9" />
    </g>

    <!-- EST. 2024 -->
    <text x="340" y="422"
        font-family="'Cormorant Garamond', 'Georgia', serif"
        font-size="12"
        font-weight="300"
        class="gold-fill"
        text-anchor="middle"
        letter-spacing="8">EST. 2024</text>

</svg>